server:
  port: 8083

services:
  activity-service:
    base-url: http://localhost:8082
  user-service:
    base-url: http://localhost:8081

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/fitnessrecommendation
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0
  mail:
    host: smtp.163.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

rabbitmq:
  exchange:
    name: fitness.change
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

ai:
  recommendation:
    auto-trigger:
      enabled: ${AI_RECOMMENDATION_AUTO_TRIGGER_ENABLED:false}

notification:
  exchange:
    name: fitness.notification
  queue:
    email: email.notification.queue
  routing-key:
    email: notification.email
  mail:
    from: ${MAIL_USERNAME:${spring.mail.username:}}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

dashscope:
  api-key: ${QWEN_API_KEY}
  model: ${QWEN_MODEL:qwen-plus}
  url: ${QWEN_URL}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  url: ${DEEPSEEK_URL:https://api.deepseek.com/chat/completions}

logging:
  level:
    com.fitness.aiservice: DEBUG
