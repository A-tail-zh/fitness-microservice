spring:

  datasource:
    url: jdbc:mysql://localhost:3306/fitness_user_db
    username: root
    password: 123456

#  jpa:
#    hibernate:
#      ddl-auto: update
#    database-platform: org.hibernate.dialect.MySQLDialect
  jpa:
    hibernate:
      ddl-auto: update  # 生产环境建议改为validate或none
    show-sql: true      # 开发时方便查看生成的SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect  # 如果是MySQL 8+
        format_sql: true
server:
  port: 8081

services:
  activity-service:
    base-url: http://localhost:8082
  ai-service:
    base-url: http://localhost:8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
